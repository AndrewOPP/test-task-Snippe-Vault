version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: snippet_vault_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: snippet_db
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: snippet_vault_mongo_express
    restart: always
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpassword@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb

volumes:
  mongodb_data:
